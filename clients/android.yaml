# =========================
# Android 客户端覆盖配置
# =========================
# 不写 macOS 专属 external-controller-unix，也不写 utun 设备名。
# 不要在这里写 rules，否则会覆盖 build.sh 自动合并出来的 rules。

# Android 本地控制器。
## external-controller: 127.0.0.1:9090

tun:
  # 启用 TUN。
  ## enable: true  ## Android 用户通常通过 WebUI 启用 TUN，这里保持默认关闭，避免冲突

  # Android 通常使用 system 栈。
  stack: system

  # 自动路由。
  auto-route: true

  # 严格路由，减少绕过。
  strict-route: true

  # 自动检测出口接口。
  auto-detect-interface: true

  # DNS 劫持。
  dns-hijack:
    - any:53

  # MTU 保守值。
  mtu: 1400

  # 不额外排除地址。
  route-exclude-address: []