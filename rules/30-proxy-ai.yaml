  - DOMAIN,servd-anthropic-website.b-cdn.net,AI

  - DOMAIN-SUFFIX,browser-intake-us5-datadoghq.com,AI ### Claude APP 监控域名

  # =========================
  # 遥测 / 日志 / 风控相关依赖
  # =========================
  # AI 服务可能依赖的 Sentry、Datadog、LivePerson 相关域名。
  # 注意：这些域名有一定泛用性，放在 AI 里是为了避免 AI 页面依赖被误直连或误拦。
  # AI 页面依赖 / 客服 / 监控
  - DOMAIN-SUFFIX,sentry.io,AI ### 通用遥测网站，但 OpenAI / Claude 依赖较重，放在 AI 里。
  - DOMAIN-SUFFIX,datadoghq.com,AI ### 同上，Claude APP 监控域名。
  - DOMAIN-SUFFIX,intercom.io,AI ### OpenAI 和 Claude 都使用 Intercom 作为客服系统，放在 AI 里避免误直连。
  - DOMAIN-SUFFIX,intercomcdn.com,AI ### 同上，Intercom 静态资源域名。
  - DOMAIN-SUFFIX,segment.io,AI ### OpenAI 依赖的用户分析服务，放在 AI 里避免误直连。

  - DOMAIN-SUFFIX,browser-intake-datadoghq.com,AI
  - DOMAIN-SUFFIX,liveperson.net,AI
  - DOMAIN-SUFFIX,lpsnmedia.net,AI

