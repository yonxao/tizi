# =========================
# 30-proxy-ai：AI 服务代理
# =========================
# 来源参考：MetaCubeX meta-rules-dat 的 category-ai-!cn 列表。
# https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.yaml
# 作用：把海外 AI 服务、AI IDE、AI API、模型平台、AI 静态资源统一走 AI 策略组。
# 思路：
# 1. AI 账号和 API 服务对出口身份比较敏感，优先代理。明确归入 AI 组，避免偶尔 DIRECT 造成出口身份漂移。
# 2. AI 网页通常依赖多套 CDN、对象存储、鉴权、实时通信、日志监控域名，需要一起代理。
# 3. 远程列表里的 +.example.com 已转换为 DOMAIN-SUFFIX,example.com,AI。
# 4. 远程列表里的精确主机名已转换为 DOMAIN,example.com,AI。

### 三个#号是 Little Snitch 里监控到的域名，说明这些域名在实际使用中被访问过，优先确认并添加到规则里。
# 其他没有#号的域名是从远程列表转换来的，可能需要后续根据实际访问情况调整。
rules:

  # =========================
  # OpenAI / ChatGPT / Sora
  # =========================
  # ChatGPT 主站、OpenAI API、静态资源、用户上传内容、Sora、OpenAI CDN / Azure 存储相关域名。
  - DOMAIN-SUFFIX,chatgpt.com,AI ###
  - DOMAIN-SUFFIX,openai.com,AI ###
  - DOMAIN,auth0.openai.com,AI
  - DOMAIN-SUFFIX,auth.openai.com,AI ###
  - DOMAIN-SUFFIX,oaistatic.com,AI ###
  - DOMAIN-SUFFIX,oaiusercontent.com,AI ###

  - DOMAIN-SUFFIX,sora.com,AI
  - DOMAIN-SUFFIX,openai.com.cdn.cloudflare.net,AI
  - DOMAIN,openaiapi-site.azureedge.net,AI
  - DOMAIN,openaicom-api-bdcpf8c6d2e9atf6.z01.azurefd.net,AI
  - DOMAIN,openaicom.imgix.net,AI
  - DOMAIN,openaicomproductionae4b.blob.core.windows.net,AI
  - DOMAIN,production-openaicom-storage.azureedge.net,AI
  - DOMAIN-SUFFIX,livekit.cloud,AI
  - DOMAIN-SUFFIX,chat.com,AI

  # =========================
  # Claude / Anthropic
